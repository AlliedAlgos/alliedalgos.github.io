<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-center">

<div id="login-container" class="bg-white p-8 rounded shadow-md w-full max-w-md">
  <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>
  <input id="email" type="email" placeholder="Email" class="w-full p-2 border rounded mb-4">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 border rounded mb-4">
  <button id="login-btn" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Login</button>
  <p id="login-error" class="text-red-500 mt-2"></p>
</div>

<div id="dashboard-container" class="hidden p-8 w-full max-w-5xl">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Supabase Dashboard</h1>
    <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
  </div>

  <table class="min-w-full bg-white rounded shadow overflow-hidden mb-4" id="data-table">
    <thead class="bg-gray-200">
      <tr>
        <th class="py-2 px-4 border">ID</th>
        <th class="py-2 px-4 border">Name</th>
        <th class="py-2 px-4 border">Email</th>
        <th class="py-2 px-4 border">Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="mb-4">
    <h2 class="text-xl font-semibold mb-2">Add New Record</h2>
    <input id="new-name" type="text" placeholder="Name" class="p-2 border rounded mr-2">
    <input id="new-email" type="text" placeholder="Email" class="p-2 border rounded mr-2">
    <button id="add-btn" class="bg-green-500 text-white py-2 px-4 rounded hover:bg-green-600">Add</button>
  </div>
</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
