<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlliedDash</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 flex flex-col min-h-screen">

<!-- Top Navbar -->
<header class="flex items-center justify-between bg-gray-900 px-4 py-3 border-b border-gray-800">
  <div class="flex items-center gap-3">
    <button id="menu-btn" class="md:hidden text-gray-100">&#9776;</button>
    <h1 class="text-xl font-bold">AlliedDash</h1>
  </div>

  <div class="flex items-center gap-3">
    <span id="user-name" class="text-sm hidden md:inline"></span>
    <img id="user-avatar" class="w-8 h-8 rounded-full hidden" />
  </div>
</header>

<div class="flex flex-1 overflow-hidden">
  <!-- Sidebar -->
  <aside id="sidebar" class="bg-gray-900 w-64 md:block hidden border-r border-gray-800 p-4 flex-shrink-0">
    <nav class="flex flex-col gap-2">
      <a data-page="members.html" href="members.html" target="content" class="nav-link px-4 py-2 rounded hover:bg-gray-800">Members</a>
      <a data-page="seasons.html" href="seasons.html" target="content" class="nav-link px-4 py-2 rounded hover:bg-gray-800">Seasons</a>
      <a data-page="robots.html" href="robots.html" target="content" class="nav-link px-4 py-2 rounded hover:bg-gray-800">Robot Designs</a>
      <a href="login.html" class="mt-6 px-4 py-2 rounded text-red-400 hover:bg-gray-800">Logout</a>
    </nav>
  </aside>

  <!-- Page Content -->
  <iframe name="content" src="members.html" class="flex-1 border-0"></iframe>
</div>

<script type="module">
  import { supabase } from "./supabaseClient.js";

  // Load user info
  const { data } = await supabase.auth.getUser();
  if (data.user) {
    document.getElementById("user-name").textContent = data.user.user_metadata.full_name || data.user.email;
    const avatar = data.user.user_metadata.avatar_url;
    if (avatar) {
      const img = document.getElementById("user-avatar");
      img.src = avatar;
      img.classList.remove("hidden");
    }
  }

  // Sidebar toggle for mobile
  const sidebar = document.getElementById("sidebar");
  document.getElementById("menu-btn").onclick = () => {
    sidebar.classList.toggle("hidden");
  };

  // Active link highlighting
  const links = document.querySelectorAll(".nav-link");
  links.forEach(link => {
    link.addEventListener("click", () => {
      links.forEach(l => l.classList.remove("bg-gray-800"));
      link.classList.add("bg-gray-800");
    });
  });
</script>
</body>
</html>
