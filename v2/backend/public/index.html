<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlliedDash</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-gray-100">

<!-- TOP NAV -->
<header class="flex justify-between items-center px-6 py-4 bg-gray-900 border-b border-gray-800">
  <h1 class="text-xl font-bold">AlliedDash</h1>

  <div class="flex items-center gap-3">
    <span id="user-name" class="text-sm"></span>
    <img id="user-avatar" class="w-8 h-8 rounded-full hidden" />
  </div>
</header>

<div class="flex">
  <!-- SIDEBAR -->
  <aside class="w-64 bg-gray-900 border-r border-gray-800 p-4 min-h-screen">
    <nav class="flex flex-col gap-2">
<a data-page="members.html" href="members.html" target="content"
   class="nav-link px-4 py-2 rounded hover:bg-gray-800">
  Members
</a>

<a data-page="seasons.html" href="seasons.html" target="content"
   class="nav-link px-4 py-2 rounded hover:bg-gray-800">
  Seasons
</a>

<a data-page="robots.html" href="robots.html" target="content"
   class="nav-link px-4 py-2 rounded hover:bg-gray-800">
  Robot Designs
</a>
<script>
const links = document.querySelectorAll(".nav-link");

links.forEach(link => {
  link.addEventListener("click", () => {
    links.forEach(l => l.classList.remove("bg-gray-800"));
    link.classList.add("bg-gray-800");
  });
});
</script>

      <a href="login.html" class="mt-6 text-red-400">Logout</a>
    </nav>
  </aside>

  <!-- PAGE CONTENT -->
  <iframe
    name="content"
    src="members.html"
    class="flex-1 h-[calc(100vh-64px)] border-0"
  ></iframe>
</div>
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://eyxhddkoqotedgucpfbz.supabase.co",
  "sb_publishable_h4nlL7bfvrg-amPOoqyhTw_CJjsVfJc"
);

const { data } = await supabase.auth.getUser();
if (data.user) {
  document.getElementById("user-name").textContent =
    data.user.user_metadata.full_name || data.user.email;

  const avatar = data.user.user_metadata.avatar_url;
  if (avatar) {
    const img = document.getElementById("user-avatar");
    img.src = avatar;
    img.classList.remove("hidden");
  }
}
</script>

</body>
</html>
