<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://rsms.me/inter/inter.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('https://static.vecteezy.com/system/resources/previews/042/384/365/non_2x/blue-purple-wave-curve-smooth-overlap-on-black-background-illustration-vector.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .card {
      background-color: rgb(57, 9, 87,0.7); /* Card color */
      border-radius: 1rem;
      padding: 10rem;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 32px; /* Header size */
      margin-bottom: 1rem;
    }

    p {
      font-size: 16px; /* Paragraph size */
      margin-bottom: 2rem;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.75rem;
      border: 1px solid #4a5568;
      background-color: #4299e1;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .google-btn:hover {
      background-color: #3182ce;
    }

    .error-msg {
      color: #fc8181;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h1 class="text-3xl">Allied Algorithms Backend</h1>
  <p>____________________________________________________________</p>
  <p>Sign in:</p>

  <button class="google-btn" onclick="googleLogin()">
    <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" class="w-6 h-6">
    Sign in with Google
  </button>

  <p id="error" class="error-msg"></p>
</div>

<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyBESpx6a7YT1qoaNZ4P-9j7X0SjAhdkePg",
    authDomain: "alliedalgo.firebaseapp.com",
    databaseURL: "https://alliedalgo-default-rtdb.firebaseio.com",
    projectId: "alliedalgo",
    storageBucket: "alliedalgo.firebasestorage.app",
    messagingSenderId: "333625041078",
    appId: "1:333625041078:web:b4d7d3cfc5d3053b238617"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const emailKey = user.email.replace('.', ',');
      const allowedRef = ref(db, "allowedEmails/" + emailKey);
      onValue(allowedRef, snap => {
        if (snap.exists() && snap.val() === true) {
          window.location.href = "dashboard.html";
        } else {
          signOut(auth);
          const err = document.getElementById("error");
          err.textContent = "Access denied";
          err.style.display = "block";
        }
      });
    }
  });

  window.googleLogin = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const emailKey = result.user.email.replace('.', ',');
      const allowedRef = ref(db, "allowedEmails/" + emailKey);
      onValue(allowedRef, snap => {
        if (snap.exists() && snap.val() === true) {
          window.location.href = "dashboard.html";
        } else {
          signOut(auth);
          const err = document.getElementById("error");
          err.textContent = "Access denied";
          err.style.display = "block";
        }
      });
    } catch (e) {
      const err = document.getElementById("error");
      err.textContent = e.message;
      err.style.display = "block";
    }
  };
</script>

</body>
</html>
