<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AlliedDash</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 flex items-center justify-center min-h-screen text-gray-100">

<div class="bg-gray-900 p-8 rounded w-full max-w-md border border-gray-800">
  <h1 class="text-2xl font-bold mb-6 text-center">AlliedDash Login</h1>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-3 p-2 rounded bg-gray-800 border border-gray-700" />

  <input id="password" type="password" placeholder="Password"
    class="w-full mb-4 p-2 rounded bg-gray-800 border border-gray-700" />

  <button id="login-btn"
    class="w-full bg-blue-600 py-2 rounded hover:bg-blue-700 mb-3">
    Login
  </button>

  <button id="google-login-btn"
    class="w-full bg-red-600 py-2 rounded hover:bg-red-700">
    Sign in with Google
  </button>

  <p id="login-error" class="text-red-400 mt-3 text-sm"></p>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
