<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AlliedWork – Mission Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #000000; --border: rgba(255, 255, 255, 0.08); }
    body { background-color: var(--bg); color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
    .glass-sidebar { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border); width: 64px; transition: width 0.3s; z-index: 50; }
    .glass-sidebar:hover { width: 200px; }
    .sidebar-label { opacity: 0; display: none; margin-left: 15px; }
    .glass-sidebar:hover .sidebar-label { opacity: 1; display: block; }
    .pill-tab { padding: 8px 20px; border-radius: 99px; font-size: 13px; color: #52525b; cursor: pointer; transition: 0.2s; }
    .pill-tab.active { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
    #editor-container { position: absolute; inset: 0; }
  </style>
</head>
<body class="h-screen w-screen flex">
  <aside class="glass-sidebar flex flex-col h-full overflow-hidden">
    <div class="h-16 flex items-center px-5 font-bold text-xl border-b border-white/5">AW</div>
    <nav class="flex-1 py-6 space-y-2">
      <button class="flex items-center w-full px-5 py-3 hover:text-white text-zinc-500" onclick="location.reload()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="sidebar-label">Editor</span>
      </button>
      <button class="flex items-center w-full px-5 py-3 hover:text-white text-zinc-500" onclick="window.open('robot-map.html','Map','width=1200,height=800')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        <span class="sidebar-label">Popout Map</span>
      </button>
      <button id="logoutBtn" class="flex items-center w-full px-5 py-3 text-red-500 hover:text-red-400 mt-auto">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span class="sidebar-label">Logout</span>
      </button>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0">
    <header class="h-14 flex items-center px-6 gap-2 border-b border-white/5">
      <div id="tab-main" class="pill-tab active" onclick="switchTab('main')">main.aw</div>
      <div id="tab-gen" class="pill-tab" onclick="switchTab('gen')">generated.py</div>
    </header>
    <div class="flex-1 relative"><div id="editor-container"></div></div>
    <div class="h-[40%] flex border-t border-white/5 bg-zinc-950/50">
      <div class="w-[35%] p-4 font-mono text-xs flex flex-col">
        <div id="term-out" class="flex-1 overflow-y-auto space-y-1 text-zinc-500"></div>
        <div class="flex items-center gap-2 mt-2 pt-2 border-t border-white/5">
          <span class="text-emerald-500">></span>
          <input id="term-in" type="text" class="bg-transparent outline-none text-zinc-200 w-full" placeholder="Command...">
        </div>
      </div>
      <div class="w-[65%] border-l border-white/5 p-2 bg-black">
        <iframe id="map-frame" src="robot-map.html" class="w-full h-full rounded-xl border border-white/5"></iframe>
      </div>
    </div>
  </main>

  <script>
    const S_URL = "https://bqagmevmzpuvgiigyime.supabase.co", S_KEY = "sb_publishable_rcXEO06dge8l_iJI_AUbSA_vD321UNP";
    const supabaseClient = supabase.createClient(S_URL, S_KEY);
    const bc = new BroadcastChannel('allied_sync');
    let editor, motorL="C", motorR="D", currentFile="main", autoCode=false, saveTimer;
    const files = { main: "speed(5)\ndrive(100)", gen: "" };

    function log(t, c="text-zinc-500") {
      const d = document.createElement('div'); d.className = c; d.innerText = `> ${t}`;
      const o = document.getElementById('term-out'); o.appendChild(d); o.scrollTop = o.scrollHeight;
    }

    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs' }});
    require(['vs/editor/editor.main'], () => {
      editor = monaco.editor.create(document.getElementById('editor-container'), {
        value: files.main, language: "python", theme: "vs-dark", automaticLayout: true, minimap: {enabled: false}
      });
      editor.onDidChangeModelContent(() => { if(currentFile==='main') { clearTimeout(saveTimer); saveTimer = setTimeout(save, 2000); }});
    });

    async function save() {
      const { data: {user} } = await supabaseClient.auth.getUser();
      if(!user) return;
      await supabaseClient.from('user_scripts').upsert({ id: user.id, aw_content: editor.getValue(), updated_at: new Date() });
    }

    document.getElementById('term-in').addEventListener('keydown', (e) => {
      if(e.key==='Enter') {
        const val = e.target.value.trim(); e.target.value="";
        if(val.toLowerCase()==='record') { autoCode=!autoCode; log(`Recording: ${autoCode?'ON':'OFF'}`, autoCode?'text-emerald-400':'text-red-400'); return; }
        if(val.includes(',')) {
          if(/[A-F],[A-F]/.test(val.toUpperCase())) {
            const p = val.toUpperCase().split(','); motorL=p[0]; motorR=p[1];
            log(`Motors: ${motorL}, ${motorR}`, "text-emerald-500");
          } else {
            const c = val.split(','); bc.postMessage({type:'SET_POS', x:parseInt(c[0]), y:parseInt(c[1])});
          }
        }
      }
    });

    bc.onmessage = (e) => {
      if(e.data.type === 'RECORD_MOVE' && autoCode) {
        const turn = `turn(${Math.round(e.data.angle)})`, drive = `drive(${Math.round(e.data.dist)})`;
        editor.setValue(`${editor.getValue()}\n${turn}\n${drive}`);
      }
      if(e.data.type === 'REQUEST_RUN') bc.postMessage({ type: 'RUN_CODE', command: editor.getValue() });
    };

    function switchTab(t) {
      if(t===currentFile) return;
      if(currentFile==='main') files.main = editor.getValue();
      if(t==='gen') {
        const body = files.main.split('\n').map(l => (l.trim() && !l.trim().startsWith('#')) ? `    await ${l}` : `    ${l}`).join('\n');
        files.gen = `import runloop,math,motor_pair,motor,time\nfrom hub import port\nr=22\nasync def drive(d):\n    deg=int((d/(2*r*math.pi))*360)\n    await motor_pair.move_for_degrees(motor_pair.PAIR_1, deg, 0)\nasync def turn(d):\n    await motor_pair.move_for_degrees(motor_pair.PAIR_1, int((d/100)*360), 100)\nasync def main():\n    motor_pair.pair(motor_pair.PAIR_1, port.${motorL}, port.${motorR})\n${body}\nrunloop.run(main())`;
        editor.setValue(files.gen); editor.updateOptions({readOnly:true});
      } else {
        editor.setValue(files.main); editor.updateOptions({readOnly:false});
      }
      currentFile = t;
      document.getElementById('tab-main').className = `pill-tab ${t==='main'?'active':''}`;
      document.getElementById('tab-gen').className = `pill-tab ${t==='gen'?'active':''}`;
    }

    async function init() {
      const { data: {user} } = await supabaseClient.auth.getUser();
      if(!user) { window.location.href="login.html"; return; }
      const {data} = await supabaseClient.from('user_scripts').select('aw_content').eq('id', user.id).single();
      if(data) { files.main = data.aw_content; editor.setValue(data.aw_content); }
      log(`Welcome ${user.email.split('@')[0]}. Type 'record' to begin clicking paths.`, "text-amber-400");
    }
    document.getElementById('logoutBtn').onclick = async () => { await supabaseClient.auth.signOut(); window.location.href="login.html"; };
    init();
  </script>
</body>
</html>
