<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AlliedWork – basev1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #000000;
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(10, 10, 10, 0.85);
      --illuminate: #ffffff;
    }

    body { 
      background-color: var(--bg); 
      font-family: 'Inter', sans-serif; 
      color: white; 
      perspective: 2000px;
      overflow: hidden;
    }

    /* 3D GLASS SIDEBAR */
    .glass-sidebar {
      background: var(--glass);
      backdrop-filter: blur(30px);
      border-right: 1px solid var(--border);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s ease;
      transform-style: preserve-3d;
      transform: rotateY(3deg);
      transform-origin: left;
      width: 64px;
      z-index: 100;
    }
    .glass-sidebar:hover { 
      width: 224px; 
      transform: rotateY(0deg); 
    }

    .sidebar-label {
      opacity: 0; white-space: nowrap; display: none;
      transition: opacity 0.3s ease;
    }
    .glass-sidebar:hover .sidebar-label { 
      opacity: 1; display: block; 
    }

    /* FLOATING MODAL CARDS */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(0px);
      z-index: 1000;
      display: none;
      align-items: center; justify-content: center;
      transition: all 0.4s ease;
    }
    .modal-overlay.active { 
      display: flex; 
      backdrop-filter: blur(20px); 
    }

    .glass-card {
      background: rgba(15, 15, 15, 0.98);
      border: 1px solid var(--border);
      border-radius: 32px;
      width: 90%; max-width: 480px;
      padding: 40px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.9);
      transform: scale(0.9) translateY(40px);
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .modal-overlay.active .glass-card { transform: scale(1) translateY(0); }

    /* EDITOR FOCUS BLUR */
    #main-content { 
      transition: filter 0.5s ease, transform 0.5s ease; 
    }
    .content-blurred { 
      filter: blur(12px) brightness(0.6); 
      transform: scale(0.98); 
      pointer-events: none;
    }

    /* PILL TABS */
    .pill-tab { 
      position: relative; padding: 8px 24px; border-radius: 99px; 
      font-size: 13px; color: #52525b; transition: all 0.3s; 
    }
    .pill-tab.active { 
      background: rgba(255,255,255,0.05); 
      border: 1px solid var(--border); 
      color: white; 
    }
    .pill-tab.active::after {
      content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
      width: 14px; height: 1.5px; background: white; box-shadow: 0 0 10px white;
    }

    .nav-btn { 
      display: flex; align-items: center; width: 100%; padding: 0 20px; 
      height: 54px; color: #52525b; transition: 0.3s ease; 
    }
    .nav-btn:hover, .nav-btn.active { color: white; }

    #editor-container { position: absolute; inset: 0; }
  </style>
</head>

<body class="h-screen w-screen flex">

<div id="modal-settings" class="modal-overlay" onclick="closeModals()">
  <div class="glass-card" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-10">
      <h2 class="text-3xl font-bold tracking-tighter">Settings</h2>
      <button onclick="closeModals()" class="text-zinc-500 hover:text-white">✕</button>
    </div>
    <div class="space-y-4">
      <div class="p-5 bg-white/5 rounded-3xl border border-white/5 flex items-center justify-between">
        <div>
          <p class="font-semibold text-sm">Theme Mode</p>
          <p class="text-xs text-zinc-500">Dark Design / Light Paper</p>
        </div>
        <button onclick="toggleTheme()" class="w-14 h-7 bg-zinc-800 rounded-full relative p-1">
          <div id="theme-dot" class="w-5 h-5 bg-white rounded-full transition-all"></div>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="modal-contributors" class="modal-overlay" onclick="closeModals()">
  <div class="glass-card" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-10">
      <h2 class="text-3xl font-bold tracking-tighter">Contributors</h2>
      <button onclick="closeModals()" class="text-zinc-500 hover:text-white">✕</button>
    </div>
    <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center gap-4">
      <div class="w-10 h-10 rounded-full bg-zinc-700"></div>
      <div>
        <p class="font-bold text-sm">AlliedWork Team</p>
        <p class="text-xs text-zinc-500">Core Engine</p>
      </div>
    </div>
  </div>
</div>

<div id="app" class="flex h-full w-full">
  <aside class="glass-sidebar flex flex-col h-full">
    <div class="h-20 flex items-center px-5 border-b border-white/5 overflow-hidden">
      <div class="w-6 flex justify-center font-bold text-xl tracking-tighter shrink-0">AW</div>
      <span class="sidebar-label font-semibold text-lg ml-4">AlliedWork</span>
    </div>
    
    <div class="flex-1 flex flex-col py-8 gap-4 overflow-hidden">
      <button onclick="closeModals()" class="nav-btn active">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
        <span class="sidebar-label ml-4">Editor</span>
      </button>
      <button onclick="openModal('settings')" class="nav-btn">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
        <span class="sidebar-label ml-4">Settings</span>
      </button>
      <button onclick="openModal('contributors')" class="nav-btn">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
        <span class="sidebar-label ml-4">Contributors</span>
      </button>

      <div class="mt-auto border-t border-white/5 pt-4">
        <button id="logout-trigger" class="nav-btn hover:text-red-500">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
          <span class="sidebar-label ml-4">Logout</span>
        </button>
      </div>
    </div>
  </aside>

  <main id="main-content" class="flex-1 flex flex-col min-w-0">
    <header class="h-16 flex items-center px-8 gap-4 border-b border-white/5">
      <button class="pill-tab active">main.aw</button>
      <button class="pill-tab">generated.py</button>
    </header>
    <div class="flex-1 relative">
      <div id="editor-container"></div>
    </div>
    <div class="h-[35%] flex border-t border-white/5 bg-black/40">
      <div class="flex-1 p-6 font-mono text-xs text-zinc-600">> AlliedWork basev1 ready...</div>
      <div class="w-[42%] border-l border-white/5 p-4">
        <iframe src="robot-map.html" class="w-full h-full rounded-3xl bg-zinc-950"></iframe>
      </div>
    </div>
  </main>
</div>

<script>
  // SUPABASE CONFIG
  const S_URL = "https://bqagmevmzpuvgiigyime.supabase.co";
  const S_KEY = "sb_publishable_rcXEO06dge8l_iJI_AUbSA_vD321UNP";
  const supabaseClient = supabase.createClient(S_URL, S_KEY);

  async function initAuth() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) window.location.replace("login.html");
    document.getElementById('logout-trigger').onclick = async () => {
      await supabaseClient.auth.signOut();
      window.location.replace("login.html");
    };
  }

  // MODAL CONTROLS
  function openModal(id) {
    document.getElementById('modal-' + id).classList.add('active');
    document.getElementById('main-content').classList.add('content-blurred');
  }
  function closeModals() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
    document.getElementById('main-content').classList.remove('content-blurred');
  }

  // THEME
  let isDark = true;
  function toggleTheme() {
    isDark = !isDark;
    document.body.style.backgroundColor = isDark ? "#000" : "#fff";
    document.getElementById('theme-dot').style.transform = isDark ? 'translateX(0)' : 'translateX(28px)';
    if(editor) monaco.editor.setTheme(isDark ? 'vs-dark' : 'vs');
  }

  // MONACO
  let editor;
  require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs' }});
  require(['vs/editor/editor.main'], function() {
    editor = monaco.editor.create(document.getElementById('editor-container'), {
      value: "# basev1 coding area\nrobot.move(10)",
      language: "python", theme: "vs-dark", automaticLayout: true, minimap: { enabled: false }
    });
  });

  initAuth();
</script>
</body>
</html>
