<script>
  const menuBtn = document.getElementById("menu-btn");
  const mobileMenu = document.getElementById("mobileMenu");
  const overlay = document.getElementById("overlay");
  const mobileProjectsBtn = document.getElementById("mobileProjectsBtn");
  const mobileProjectsMenu = document.getElementById("mobileProjectsMenu");

  function openMenu() {
    mobileMenu.classList.remove("translate-x-full", "opacity-0");
    mobileMenu.classList.add("translate-x-0", "opacity-100");
    overlay.classList.remove("opacity-0", "pointer-events-none");
    overlay.classList.add("opacity-100");
  }

  function closeMenu() {
    mobileMenu.classList.add("translate-x-full", "opacity-0");
    mobileMenu.classList.remove("translate-x-0", "opacity-100");
    overlay.classList.add("opacity-0", "pointer-events-none");
    overlay.classList.remove("opacity-100");
    // Close mobile dropdown
    mobileProjectsMenu.style.maxHeight = "0px";
  }

  // Toggle mobile menu
  menuBtn.addEventListener("click", () => {
    const isOpen = mobileMenu.classList.contains("translate-x-0");
    if(isOpen) closeMenu();
    else openMenu();
  });

  // Toggle mobile dropdown slide
  mobileProjectsBtn.addEventListener("click", () => {
    if (mobileProjectsMenu.style.maxHeight && mobileProjectsMenu.style.maxHeight !== "0px") {
      mobileProjectsMenu.style.maxHeight = "0px";
    } else {
      mobileProjectsMenu.style.maxHeight = mobileProjectsMenu.scrollHeight + "px";
    }
  });

  // Close menu when clicking overlay
  overlay.addEventListener("click", closeMenu);
</script>
